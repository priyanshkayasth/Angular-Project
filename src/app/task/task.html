@if(isAddingTask){
<app-new-task (cancel)="onCancelTask()" (add)="onAddingTask($event)" />
}
<section id="tasks">
    <header>
        <h2>{{name}} 's task</h2>
        <menu>
            <button (click)="onAddTask()">Add task</button>
        </menu>
    </header>
    <ul>
        @for(task of selectedUserTask;track task.id){
        <li>
            <app-tasks [task]="task" (complete)="onCompleteTask($event)" />
        </li>
        }


    </ul>
</section>
